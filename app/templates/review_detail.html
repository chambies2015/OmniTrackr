<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OmniTrackr Review Detail - Read detailed reviews from the OmniTrackr community.">
  <meta name="robots" content="index, follow">
  <title>Review Detail - OmniTrackr</title>
  <link rel="canonical" href="https://omnitrackr.xyz/reviews">
  <link rel="icon" type="image/x-icon" href="/omnitrackr_favicon.ico">
  
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://omnitrackr.xyz/reviews">
  <meta property="og:title" content="Review Detail - OmniTrackr">
  <meta property="og:description" content="Read detailed reviews from the OmniTrackr community.">
  <meta property="og:image" content="https://omnitrackr.xyz/omnitrackr_vortex.png">
  <meta property="og:site_name" content="OmniTrackr">
  <meta property="og:locale" content="en_US">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://omnitrackr.xyz/reviews">
  <meta name="twitter:title" content="Review Detail - OmniTrackr">
  <meta name="twitter:description" content="Read detailed reviews from the OmniTrackr community.">
  <meta name="twitter:image" content="https://omnitrackr.xyz/omnitrackr_vortex.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      min-height: 100vh;
      padding: 20px;
    }

    .review-wrapper {
      max-width: 900px;
      margin: 0 auto;
    }

    .review-container {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 40px;
      margin: 20px 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      color: var(--fg);
    }

    .review-header {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 2px solid var(--border);
    }

    .review-poster-large {
      width: 150px;
      height: 225px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .review-header-info {
      flex: 1;
    }

    .review-header-info h1 {
      font-size: 2rem;
      margin: 0 0 15px 0;
      color: var(--fg);
    }

    .review-meta-info {
      color: var(--fg-secondary);
      margin-bottom: 15px;
      line-height: 1.8;
    }

    .review-rating-large {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 15px;
    }

    .review-category-badge {
      display: inline-block;
      padding: 6px 16px;
      background: var(--primary);
      color: white;
      border-radius: 16px;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .review-content {
      line-height: 1.9;
      font-size: 1.1rem;
      color: var(--fg);
      white-space: pre-wrap;
      margin-bottom: 30px;
    }

    .review-author {
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--fg-secondary);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--fg-secondary);
    }

    .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--fg-secondary);
    }

    @media (max-width: 768px) {
      .review-header {
        flex-direction: column;
      }

      .review-poster-large {
        width: 100%;
        height: auto;
        max-height: 400px;
      }

      .review-container {
        padding: 25px;
      }
    }
  </style>
</head>

<body class="dark-mode">
  <div class="review-wrapper">
    <a href="/reviews" class="back-link">Back to Reviews</a>
    
    <div id="reviewContainer" class="review-container">
      <div class="loading">Loading review...</div>
    </div>
  </div>

  <script src="/static/review_detail.js" defer></script>
</body>

</html>
